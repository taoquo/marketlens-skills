name: Validate Skills

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate skills
        run: bash scripts/validate-skills.sh
      - name: Build skill packages
        run: bash scripts/build-skills.sh
      - name: Validate packages
        run: bash scripts/validate-skills.sh
